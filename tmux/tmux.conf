# set default shell
set -g default-command /usr/local/bin/fish
set -g default-shell /usr/local/bin/fish

# reload config key
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded";
# edit tmux config
bind E new-window "nvim ~/.config/tmux/tmux.conf"

# scripts
bind S split-window -v -c "#{pane_current_path}" "~/.config/bin/fuzzy-checkout.sh" 
bind W new-window "/usr/bin/env bash -c \"curl -s https://wttr.in | rg -v  '@igor_chubin' && while [ : ]; do sleep 1; done\"" 

# set scroll history to 100,000 lines
set-option -g history-limit 100000

# modern colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc"

# unbind the prefix and bind it to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind c new-window -ac "#{pane_current_path}"

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# split panes using \ and -
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

#auto resize panes
bind r select-layout tiled

# vim-like <prefix> + key
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# without <prefix> alt + arrow key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# resizing windows
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# multi-pane typing
bind m setw synchronize-panes on \;\
  setw pane-active-border-style fg=red \;\
  setw pane-border-style fg=yellow \;\
  display-message "Sync panes ON"

# single-pange typing
bind o setw synchronize-panes off \;\
  setw pane-active-border-style fg=green \;\
  setw pane-border-style default \;\
  display-message "Sync panes OFF"

# don't rename windows automatically
# set-option -g allow-rename off

# view current pane history (including colors) with "less" in new window
bind-key u capture-pane -S - -E - -e -b lesshist \; new-window -n "history" 'tmux show-buffer -b lesshist| less -R +G'

# window navigation
# without <prefix> shift + arrow l/r
bind -n S-Left  previous-window
bind -n S-Right next-window

# copy to X clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy &> /dev/null'
bind -T copy-mode-vi Enter send-keys -X cancel

# shortcut for moving tmux buffer to clipboard
# useful if you've selected with the mouse
bind-key -nr C-y run "tmux show-buffer | pbcopy &> /dev/null"

# avoid ESC delay
set -s escape-time 0

# automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set -g set-titles-string "#T"

# enable mouse mode
set -g mouse on

# VIM mode
set -g mode-keys vi

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence on
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour1 bg=colour18 bold'

# panes
set -g pane-border-style 'fg=colour19 bg=colour0'
set -g pane-active-border-style 'bg=colour0 fg=colour9'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour18 fg=colour137 dim'
set -g status-left '#{?client_prefix,#[bg=colour245 fg=colour233 bold],#[fg=colour155]} (#S)'
set -g status-right ''
set -g status-right-length 0
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour1 bg=colour19 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

setw -g window-status-style 'fg=colour9 bg=colour18'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# messages
set -g message-style 'fg=colour232 bg=colour16 bold'

###############
### PLUGINS ###
###############

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'

#  or neovim, restoring vim sessions
set -g @resurrect-strategy-nvim 'session'

set -g @extrakto_key 'f';	
set -g @extrakto_grab_area 'recent';	
set -g set-clipboard on

set -g @extrakto_clip_tool_run "fg"
# Linux
#set -g @extrakto_clip_tool "xclip -in -selection clipboard &> /dev/null" 
# MacOS
set -g @extrakto_clip_tool "pbcopy &> /dev/null" 

# allow OSC52 to set the clipboard
#set -g @extrakto_clip_tool "osc52"

#set -g @thumbs-osc52 1

# same hints for same matched strings
set -g @thumbs-unique enabled
set -g @thumbs-position left

# extra patterns
set -g @thumbs-regexp-1 '[a-z]+@[a-z]+.com' # Match emails
set -g @thumbs-regexp-2 '[a-f0-9]{2}:[a-f0-9]{2}:[a-f0-9]{2}:[a-f0-9]{2}:[a-f0-9]{2}:[a-f0-9]{2}:' # Match MAC addresses
set -g @thumbs-regexp-3 'Vlan\d+' # match Vlan interface on network devices

# hint brackets on
set -g @thumbs-contrast 1

set -g @thumbs-command 'tmux set-buffer -w {} && tmux display-message \"Copied {}\"'
set -g @thumbs-upcase-command 'tmux set-buffer -w {} && tmux paste-buffer && tmux display-message \"Copied {}\"'

# predifined colors: black,red,green,yellow,blue,magenta,cyan,white,default

set -g @thumbs-bg-color black
set -g @thumbs-fg-color cyan
set -g @thumbs-hint-bg-color black
set -g @thumbs-hint-fg-color red
set -g @thumbs-select-fg-color yellow
set -g @thumbs-select-bg-color black
set -g @thumbs-multi-fg-color red
set -g @thumbs-multi-bg-color green

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
