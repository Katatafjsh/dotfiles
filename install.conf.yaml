- defaults:
    link:
      create: true
      relink: true

- clean: ['~', '~/.config']

- link:
    ~/.config/karabiner/karabiner.json: karabiner/karabiner.json
    ~/.config/alacritty/alacritty.yml: alacritty/alacritty.yml

- shell:
  - [git submodule update --init --recursive, Installing submodules]

